name: Python CI

# This tells GitHub to run the tests every time you push or merge to the main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    # 1. Grabs your code from the repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Sets up the Python version from the matrix
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # 3. Installs pytest, pytest-cov, and mypy
    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-benchmark mypy
        pip install -e .

    # 4. Runs your test suite and outputs the coverage to the terminal
    - name: Run tests with pytest
      env:
        PYTHONPATH: .
      run: |
        pytest --cov=pure_python_ds --cov-report=term

    # 5. Run mypy for strict typing checks
    - name: Run mypy
      run: |
        mypy pure_python_ds